<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">

<head id="head-placeholder">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="/frontend/img/coreGear-logo-copy.png">
  <title></title>
</head>

<body class="d-flex flex-column min-vh-100">
  <main class="container-fluid mt-4 flex-grow-1">
    <!-- Layout placeholders -->
    <div id="navbar-placeholder"></div>

    <!-- ======================================================================= -->
    <!-- Content goes here -->

    <div id="content" class="row mt-5">
      <div class="col-1">

      </div>
      <div class="col-5">
        <div id="productCarousel" class="carousel slide mb-6 position-relative" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active" style="height: 400px;">
              <svg aria-hidden="true" class="bd-placeholder-img" height="100%" preserveAspectRatio="xMidYMid slice" width="100%" xmlns="http://www.w3.org/2000/svg">
                <rect width="100%" height="100%" fill="var(--bs-secondary-color)"></rect>
              </svg>
              <div class="container">
                <div class="carousel-caption d-flex flex-column align-items-center justify-content-center" style="height: 100%;">
                  <h1>&nbsp;</h1>
                  <h1>&nbsp;</h1>
                  <h1>No pictures added yet.</h1>
                  <p>Maybe someone will take some pictures soon?</p>
                </div>
              </div>
            </div>
          </div>
          <button class="btn btn-outline-white position-absolute top-50" style="left: 5%;" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="btn btn-outline-white position-absolute top-50" style="right: 5%;" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
      <div class="col-6">
        <h3 id="product-name" class="font-monospace"></h3>
        <div id="product-rating">
        </div>
        <h5 id="product-price" class="font-monospace"></h5>
        <p id="product-description"></p>
      </div>
    </div>


    <!-- ======================================================================= -->

    <!-- Theme placeholder -->
    <!-- <div id="theme-placeholder"></div> -->
  </main>

  <div id="footer-placeholder"></div>

  <div id="toast-placeholder"></div>

  <!-- New way: Load layout first, then main.js as a module -->
  <!-- 1. Load Layout (Orchestrator) -->
  <script src="/frontend/js/layout.js"></script>

  <!-- 2. Load Main App (Modular Entry Point) -->
  <!-- Note: type="module" is required for import/export syntax -->
  <script type="module" src="/frontend/js/main.js"></script>

  <script type="module" src="/frontend/js/components/product.js"></script>
  <script src="/frontend/js/components/search.js"></script>
</body>
</html>
