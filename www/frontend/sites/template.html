<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">

<head id="head-placeholder">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="/frontend/img/coreGear-logo-copy.png">
    <title>Template &#x2022; CoreGear</title>
</head>

<body class="d-flex flex-column min-vh-100">
    <main class="container-fluid mt-4 flex-grow-1">
        <!-- Layout placeholders -->
        <div id="navbar-placeholder"></div>

        <!-- ======================================================================= -->
        <!-- Content goes here -->

        <h1>Willkommen im Webshop</h1>

        <!-- ======================================================================= -->

        <!-- Theme placeholder -->
        <!-- <div id="theme-placeholder"></div> -->
    </main>

    <div id="footer-placeholder"></div>

    <!-- Toast container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer">
    <div id="loginToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <svg id="severityIndicator" class="bi me-2" width="8" height="8" fill="currentColor">
          <use xlink:href="/frontend/bootstrap-icons/bootstrap-icons.svg#circle-fill" />
        </svg>
        <strong class="me-auto">Toast title</strong>
        <small class="text-body-secondary">just now</small>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">
        Toast body text
      </div>
    </div>
  </div>

    <!-- New way: Load layout first, then main.js as a module -->
    <!-- 1. Load Layout (Orchestrator) -->
    <script src="/frontend/js/layout.js"></script>

    <!-- 2. Load Main App (Modular Entry Point) -->
    <!-- Note: type="module" is required for import/export syntax -->
    <script type="module" src="/frontend/js/main.js"></script>
</body>

</html>
