<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">

<head>
  <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/css/style.css" rel="stylesheet">
  <link href="/frontend/css/sign-in.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <!-- Dark Theme -->
  <link href="/frontend/css/sign-in.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

  <main class="container mt-4 flex-grow-1">

    <div id="navbar-placeholder"></div>

    <div class="form-signin w-100 m-auto">
      <form id="resetPasswordForm">

        <img class="mb-4" src="/frontend/img/bootstrap-logo.svg" width="72">

        <h1 class="h3 mb-3 fw-normal">Reset password</h1>

        <div class="form-floating">
          <input type="password" id="newPassword" class="form-control" placeholder="New password">
          <label>New password</label>
        </div>

        <button class="btn btn-primary w-100 py-2 mt-3" type="submit">
          Reset password
        </button>

        <div id="message" class="mt-3"></div>

      </form>
    </div>

  </main>

  <div id="toast-placeholder"></div>

  <!-- New way: Load layout first, then main.js as a module -->
  <!-- 1. Load Layout (Orchestrator) -->
  <script type="module" src="/frontend/js/layout.js"></script>

  <!-- 2. Load Main App (Modular Entry Point) -->
  <!-- Note: type="module" is required for import/export syntax -->
  <script type="module" src="/frontend/js/main.js"></script>

</body>

</html>
