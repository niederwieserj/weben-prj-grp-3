<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">

<head id="head-placeholder">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="/frontend/css/home.css" rel="stylesheet">
    <link href="/frontend/css/style.css" rel="stylesheet">
</head>

<body class="d-flex">
    <main class="container-fluid">

        <div id="navbar-placeholder"></div>

        <!-- ======================================================================= -->
        <!-- Intro -->

        <div class="p-md-5 m-md-3 bg-body-tertiary rounded" id="intro">
            <div class="heading col-md-6 p-lg-5 " id="top-heading">
                <h1 class="heading">PC parts from core to case</h1>
                <h4 class="heading">
                    Build your custom PC with CoreGear
                </h4>
                <div class="d-flex lead" id="learn-more-buy">
                    <a class="icon-link" href="#">
                        Learn more
                    </a>
                    <a class="icon-link" href="../sites/products.html">
                        Buy
                    </a>
                </div>
            </div>

        </div>

        <!-- explore shop categories: cards -->
        <div class="row g-3 my-md-3 ps-md-3">
            <h2 id="explore-heading">
                Explore by category
            </h2>
            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Cases</a>

                    <div class="image-container">
                        <img src="./../img/case-white-3500x.png" alt="white 4500x base frame" class="component-img">
                    </div>
                </div>
            </div>

            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Coolers</a>

                    <div class="image-container">
                        <img src="./../img/icue-link-h100i-lcd-liquid-cooler.png" alt="white 4500x base frame" class="component-img">
                    </div>
                </div>
            </div>

            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">RAM</a>

                    <div class="image-container">
                        <img src="./../img/vengeance-ddr5-blk.png" alt="white 4500x base frame" class="component-img">
                    </div>
                </div>
            </div>
            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">GPUs</a>

                    <div class=" image-container">
                        <img src="./../img/RTX-5080-16g-vanguard-msi.png" alt="GeForce RTX 5060 16GB vanguard msi" class="component-img">
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 my-md-3 ps-md-3">

            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Power supply</a>

                    <div class="image-container">
                        <img src="./../img/rmx-series-rm750x-corsair.png" alt="rmx series rm750x corsair modular power supply" class="component-img">
                    </div>
                </div>
            </div>

            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Fans</a>

                    <div class="image-container">
                        <img src="./../img/icue-link-rx140-max-rgb140mm-pwm-w.png" alt="icue link rx140 max rgb140mm pwm w fan" class="component-img">
                    </div>
                </div>
            </div>
            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Motherboards</a>

                    <div class="image-container">
                        <img src="./../img/mag-z890-tomahawk-wifi_II-mb.png" alt="GeForce RTX 5060 16GB vanguard msi" class="component-img">
                    </div>
                </div>
            </div>
            <div class="col-responsive">
                <div class="card explore-card pt-md-5 px-md-5">
                    <a href="#" class="stretched-link">Storage</a>

                    <div class="image-container">
                        <img src="./../img/m370-NVMe-m.2.png" alt="GeForce RTX 5060 16GB vanguard msi" class="component-img">
                    </div>
                </div>
            </div>
        </div>


        <!-- ======================================================================= -->

        <!-- Theme placeholder -->
        <!-- <div id="theme-placeholder"></div> -->
    </main>

    <div id="footer-placeholder"></div>

    <!-- New way: Load layout first, then main.js as a module -->
    <!-- 1. Load Layout (Orchestrator) -->
    <script src="/frontend/js/layout.js"></script>

    <!-- 2. Load Main App (Modular Entry Point) -->
    <!-- Note: type="module" is required for import/export syntax -->
    <script type="module" src="/frontend/js/main.js"></script>
</body>

</html>
