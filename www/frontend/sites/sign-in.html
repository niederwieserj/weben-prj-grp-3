<!DOCTYPE html>
<html lang="de">

<head id="head-placeholder">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="/frontend/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/css/sign-in.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
  <main class="container mt-4 flex-grow-1">
    <div id="navbar-placeholder"></div>

    <div class="form-signin w-100 m-auto">
      <form onsubmit="return false;">
        <img class="mb-4" src="/frontend/img/bootstrap-logo.svg" alt="" width="72" height="57" />
        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

        <div class="form-floating">
          <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" />
          <label for="floatingInput">Email address</label>
        </div>

        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password" />
          <label for="floatingPassword">Password</label>
        </div>

        <div class="form-check text-start my-3">
          <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault" />
          <label class="form-check-label" for="checkDefault">
            Remember me
          </label>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">
          Sign in
        </button>

        <hr class="my-4">

        <h2 class="h5 mb-3">Forgot password?</h2>

        <div class="mb-3">
          <label for="resetEmail" class="form-label">Email</label>
          <input
            type="email"
            id="resetEmail"
            class="form-control"
            placeholder="Enter your email"
          >
        </div>

        <button
          type="button"
          class="btn btn-warning w-100 py-2"
          onclick="requestPasswordReset()"
        >
          Reset password
        </button>

        <div id="resetMessage" class="mt-3"></div>

        <p class="mt-5 mb-3 text-body-secondary">&copy; 2017–2025</p>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/frontend/js/auth.js"></script>
  <script src="/frontend/js/layout.js"></script>
</body>

</html>
