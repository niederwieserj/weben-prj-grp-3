<div id="template" class="col product-card" data-cart-product>
    <div class="card shadow h-100">
        <a id="product-link" href="#" class="text-decoration-none text-reset">
            <svg aria-label="Placeholder: Thumbnail" class="bd-placeholder-img card-img-top" height="250"
                preserveAspectRatio="xMidYMid slice" role="img" width="100%"
                xmlns="http://www.w3.org/2000/svg" style="display: none;">
                <title>Placeholder</title>
                <rect width="100%" height="100%" fill="#55595c"></rect>
                <text x="50%" y="50%" fill="#eceeef" dy=".3em">
                    No picture added
                </text>
            </svg>

            <img class="p-5 card-img-top" height="250" style="display: none; object-fit: contain;">

            <div class="card-body">
                <p id="product-name" class="card-text fw-bold font-monospace"></p>

                <div class="d-flex justify-content-between align-items-center">
                    <div id="product-rating"></div>
                    <small id="product-price" class="text-body-secondary font-monospace"></small>
                </div>
            </div>
        </a>

        <div class="card-footer bg-transparent border-0">
            <button type="button" class="btn btn-primary w-100" data-cart-add>
                Add to cart
            </button>
        </div>
    </div>
</div>
