<div id="template" class="col">
    <div class="card shadow-sm">
        <svg aria-label="Placeholder: Thumbnail" class="bd-placeholder-img card-img-top" height="225" preserveAspectRatio="xMidYMid slice" role="img" width="100%" xmlns="http://www.w3.org/2000/svg">
            <title>Placeholder</title>
            <rect width="100%" height="100%" fill="#55595c"></rect>
            <text x="50%" y="50%" fill="#eceeef" dy=".3em">
                Thumbnail
            </text>
        </svg>
        <div class="card-body">
            <p id="product-name" class="card-text fw-bold font-monospace"></p>
            <p id="product-description" class="card-text">
            </p>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <button type="button" class="btn btn-sm btn-outline-secondary">
                        View
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-secondary">
                        Edit
                    </button>
                </div>
                <small id="product-price" class="text-body-secondary font-monospace">100 €</small>
            </div>
        </div>
    </div>
</div>
