<header class="p-3 mb-3 border-bottom">

    <div class="container">

                    </a>
                </li>
                <li>
                    <a href="../sites/products.html" class="nav-link px-2 text-white">Products</a>

            <div class="dropdown text-end" id="nav-drop-logged-in" style="display: none;">

                    <svg class="bi" width="32" height="32" fill="currentColor">
                        <use xlink:href="/frontend/bootstrap-icons/bootstrap-icons.svg#person-circle" />

            </div>
            <a class="navbar-cart position-relative" href="#">

                    <use xlink:href="/frontend/bootstrap-icons/bootstrap-icons.svg#cart" />
                </svg>
                <span class="position-absolute top-105 start-100 translate-middle badge rounded-pill bg-primary">

                    <span class="visually-hidden">items in cart</span>
